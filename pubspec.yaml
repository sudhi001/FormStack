name: formstack
description: A cross-platform ResearchKit alternative for Flutter. Build dynamic forms and surveys with 30 input types, 35+ validators, consent flows, and JSON support.
version: 2.1.1
homepage: https://github.com/sudhi001/FormStack
repository: https://github.com/sudhi001/FormStack
issue_tracker: https://github.com/sudhi001/FormStack/issues
topics:
  - forms
  - survey
  - ui
  - json
  - widgets
screenshots:
  - description: 'Logo of formstack framework'
    path: screenshots/logo.png

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: '>=2.19.6 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  webview_flutter: ^4.13.1
  rxdart: ^0.28.0
  dio: ^5.9.2
  uuid: ^4.5.3
  web: ^1.1.1
  reviews_slider: ^2.0.0
  lottie: ^3.3.2
  collection: ^1.19.1
  file_picker: ^10.3.10
  google_maps_flutter_web: ^0.6.2
  google_maps_flutter: ^2.17.0
  location: ^8.0.1
  google_maps: ^8.2.0
  http: ^1.6.0
  mask_text_input_formatter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/lottiefiles/
    - screenshots/logo.png
